tags:
  - name: Public
    description: Get projects

paths:
  /api/public/projects:
    get:
      summary: Get all projects with pagination
      tags:
        - Public
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            default: 6
          description: Limit of project in every page
      responses:
        "200":
          description: Project created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  data:
                    type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Project'
                      meta:
                        $ref: '#/components/schemas/Metadata'
                  message:
                    type: string
                    example: List all projects

        "500":
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 500
                  message:
                    type: string
                    example: Internal server error

  /projects/:projectId:
    get:
      summary: Get project detail by Id
      tags:
        - Public
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successfully get project detail by Id
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  project:
                    $ref: '#/components/schemas/Project'
                  meta:
                    type: object
                    properties:
                      index:
                        type: integer
                        example: 1
                      totalProjects:
                        type: integer
                        example: 2
                      prev:
                        type: object
                        properties:
                          projectId:
                            type: string
                            example: f6ff85d2-ccde-4152-b5c8...
                          name:
                            type: string
                            example: Website Profile
                      next:
                        type: object
                        properties:
                          projectId:
                            type: string
                            example: f6ff85d2-ccde-4152-b5c8...
                          name:
                            type: string
                            example: Website Profile
                  message:
                    type: string
                    example: Succesfully Get Data with projectId

        "404":
          description: Project not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 404
                  message:
                    type: string
                    example: Project not found  

        "500":
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 500
                  message:
                    type: string
                    example: Internal server error           